server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # --- Headers de Seguridad ---
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # CSP: 'self' cubre mismo origen; connect-src usa https: wss: para permitir
    # la API y WebSocket en cualquier dominio configurado via VITE_API_BASE_URL / VITE_WS_URL.
    # Para mayor restricción, reemplazar https: wss: por los dominios exactos de producción.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self'; connect-src 'self' https: wss:; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;

    # HSTS - descomentar cuando el entorno use HTTPS
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # --- Compresión Gzip ---
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    # --- Cache de Assets Estáticos ---
    # Vite genera nombres con hash, se pueden cachear agresivamente
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
    }

    # --- SPA Fallback ---
    location / {
        try_files $uri $uri/ /index.html;
    }
}
